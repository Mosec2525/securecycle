name: CI

on:
  push:
  pull_request:

jobs:
  test-package-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Audit dependencies
        run: npm run audit

      - name: Audit VSIX contents
        run: npm run package:ls
